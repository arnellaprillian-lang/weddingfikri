<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f6f2eb;
  color:#333;
  text-align:center;
}

/* OPENING */
#opening {
  position:fixed;
  width:100%;
  height:100%;
  background:#2f2f2f;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
  transition:opacity 0.6s ease;
  padding:20px;
}

#opening h3 {
  margin:5px 0;
}

#opening button {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#c8a96a;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* HEADER */
header {
  background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
  url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc');
  background-size:cover;
  background-position:center;
  color:white;
  padding:120px 20px;
}

h1 {
  font-family:'Playfair Display', serif;
  font-size:42px;
}

/* SECTION */
.section {
  padding:50px 20px;
}

.card {
  background:white;
  max-width:500px;
  margin:20px auto;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn {
  display:inline-block;
  margin-top:15px;
  padding:10px 20px;
  border-radius:25px;
  background:#8b5e3c;
  color:white;
  text-decoration:none;
}

/* COUNTDOWN */
#countdown {
  font-size:20px;
  margin-top:10px;
}

/* ANIMATION */
.fade {
  opacity:0;
  transform:translateY(20px);
  transition:1s;
}

.show {
  opacity:1;
  transform:translateY(0);
}

footer {
  background:#2f2f2f;
  color:white;
  padding:20px;
}
</style>
</head>

<body>

<!-- OPENING -->
<div id="opening">
  <h2>Kepada Yth:</h2>
  <h3 id="guest">Tamu Undangan</h3>
  <p id="address"></p>
  <button id="openBtn">Buka Undangan</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<header class="fade">
  <h1>Arnell & Pasangan</h1>
  <p>22 Desember 2026</p>
  <div id="countdown"></div>
</header>

<div class="section fade">
  <div class="card">
    <h2>Wilujeng Sumping</h2>
    <p>Kalayan rasa kabagjaan, kami ngahaturkeun uleman...</p>
  </div>
</div>

<div class="section fade">
  <div class="card">
    <h2>Detail Acara</h2>
    <p>Akad: 08.00 WIB</p>
    <p>Resepsi: 10.00 WIB</p>
    <a class="btn" href="https://maps.google.com" target="_blank">Lokasi</a>
  </div>
</div>

<div class="section fade">
  <div class="card">
    <h2>RSVP</h2>
    <a class="btn" href="https://wa.me/628xxxxxxxxxx">WhatsApp</a>
  </div>
</div>

<footer>
  <p>Hatur nuhun 🙏</p>
</footer>

<script>
// =====================
// AMBIL DATA URL
// =====================
const params = new URLSearchParams(window.location.search);
const name = params.get('to');
const addr = params.get('addr');

if (name) {
  document.getElementById("guest").innerText = name;
}
if (addr) {
  document.getElementById("address").innerText = addr;
}

// =====================
// OPEN INVITE (ANTI BUG)
// =====================
let opened = false;
const btn = document.getElementById("openBtn");

btn.addEventListener("click", () => {
  if (opened) return;
  opened = true;

  btn.disabled = true;
  btn.innerText = "Membuka...";

  const opening = document.getElementById("opening");
  opening.style.opacity = "0";

  setTimeout(() => {
    opening.style.display = "none";
  }, 600);

  document.getElementById("music").play().catch(()=>{});
});

// =====================
// COUNTDOWN
// =====================
const target = new Date("Dec 22, 2026 08:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const gap = target - now;

  if (gap <= 0) {
    document.getElementById("countdown").innerHTML = "Acara Dimulai 🎉";
    return;
  }

  const d = Math.floor(gap / (1000*60*60*24));
  const h = Math.floor((gap % (1000*60*60*24))/(1000*60*60));
  const m = Math.floor((gap % (1000*60*60))/(1000*60));
  const s = Math.floor((gap % (1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    `${d} Hari ${h} Jam ${m} Menit ${s} Detik`;
}, 1000);

// =====================
// SCROLL ANIMATION
// =====================
const faders = document.querySelectorAll(".fade");

const showOnScroll = () => {
  faders.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 50) {
      el.classList.add("show");
    }
  });
};

window.addEventListener("scroll", showOnScroll);
window.addEventListener("load", showOnScroll);
</script>

</body>
</html>
