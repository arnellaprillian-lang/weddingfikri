<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0c0c0c;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    scroll-behavior: smooth;
}

/* GOLD STYLE */
.gold {
    color: #d4af37;
}

/* COVER */
.cover {
    height: 100vh;
    background: linear-gradient(180deg,#000,#1a1a1a);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: fadeIn 2s ease;
}

.cover h1 {
    font-family: 'Playfair Display', serif;
    letter-spacing: 4px;
    color: #d4af37;
}

.cover a {
    margin-top: 30px;
    padding: 12px 30px;
    border: 1px solid #d4af37;
    color: #d4af37;
    text-decoration: none;
    transition: 0.3s;
}

.cover a:hover {
    background: #d4af37;
    color: black;
}

/* SECTION */
section {
    padding: 80px 20px;
    text-align: center;
    animation: fadeUp 1.5s ease;
}

/* HERO */
.hero h2 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: #d4af37;
}

/* MEMPELAI */
.mempelai {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 20px;
    border: 1px solid #222;
    width: 200px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    border-color: #d4af37;
}

.card img {
    width: 100%;
    border-radius: 50%;
    border: 3px solid #d4af37;
}

/* ACARA */
.acara {
    background: #111;
}

.box {
    margin: 20px auto;
    padding: 20px;
    border: 1px solid #d4af37;
    width: 250px;
}

/* GALERI */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.gallery img {
    width: 150px;
    margin: 10px;
    border-radius: 10px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.1);
}

/* RSVP */
.rsvp input, .rsvp textarea {
    width: 80%;
    padding: 10px;
    margin: 10px;
    background: transparent;
    border: 1px solid #d4af37;
    color: white;
}

.rsvp button {
    padding: 10px 25px;
    border: none;
    background: #d4af37;
    color: black;
}

/* FOOTER */
.footer {
    padding: 40px;
    font-size: 14px;
    color: #aaa;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes fadeUp {
    from {
        opacity:0;
        transform: translateY(40px);
    }
    to {
        opacity:1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- COVER -->
<section class="cover">
    <h1>WEDDING INVITATION</h1>
    <p class="gold">Fikri & Pasangan</p>
    <a href="#home">Buka Undangan</a>
</section>

<!-- HERO -->
<section id="home" class="hero">
    <h2>Fikri & Pasangan</h2>
    <p>12 Desember 2026</p>
</section>

<!-- MEMPELAI -->
<section class="mempelai">
    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3 class="gold">Fikri</h3>
        <p>Putra dari Bpk...</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3 class="gold">Pasangan</h3>
        <p>Putri dari Ibu...</p>
    </div>
</section>

<!-- ACARA -->
<section class="acara">
    <h2 class="gold">Save The Date</h2>

    <div class="box">
        <h3>Akad</h3>
        <p>10.00 WIB</p>
        <p>Bandung</p>
    </div>

    <div class="box">
        <h3>Resepsi</h3>
        <p>13.00 WIB</p>
    </div>
</section>

<!-- GALERI -->
<section>
    <h2 class="gold">Gallery</h2>
    <div class="gallery">
        <img src="https://via.placeholder.com/150">
        <img src="https://via.placeholder.com/150">
        <img src="https://via.placeholder.com/150">
    </div>
</section>

<!-- RSVP -->
<section class="rsvp">
    <h2 class="gold">Ucapan & Doa</h2>
    <input type="text" placeholder="Nama">
    <textarea placeholder="Tulis ucapan..."></textarea>
    <br>
    <button>Kirim</button>
</section>

<!-- FOOTER -->
<div class="footer">
    © 2026 Wedding Invitation
</div>

</body>
</html>
